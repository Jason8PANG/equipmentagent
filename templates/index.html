<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>设备维修助手</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f0f4fa; color: #1a1a2e; }

    .page { display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 18px;
      background: linear-gradient(135deg, #1677ff 0%, #0050d0 100%);
      color: #fff;
      box-shadow: 0 2px 12px rgba(22,119,255,.3);
      flex-shrink: 0;
    }
    .header .logo { font-size: 24px; }
    .header .title { font-size: 16px; font-weight: 700; }
    .header .sub   { font-size: 11px; opacity: .8; margin-top: 2px; }
    .header-status { margin-left: auto; font-size: 12px; opacity: .85; display: flex; align-items: center; gap: 5px; }
    .header-add-btn {
      margin-left: 14px; padding: 6px 16px;
      background: rgba(255,255,255,.2); color: #fff;
      border: 1px solid rgba(255,255,255,.35); border-radius: 18px;
      font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: none;
      display: flex; align-items: center; gap: 5px;
      transition: all .2s; white-space: nowrap;
    }
    .header-add-btn:hover { background: rgba(255,255,255,.35); border-color: #fff; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #52e58a; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* Chat area */
    .chat-wrap {
      flex: 1; overflow-y: auto; padding: 20px 16px 10px;
      display: flex; flex-direction: column; gap: 18px;
      scroll-behavior: smooth;
    }
    .chat-wrap::-webkit-scrollbar { width: 4px; }
    .chat-wrap::-webkit-scrollbar-thumb { background: #c8d4f0; border-radius: 4px; }

    /* Message row */
    .msg { display: flex; gap: 10px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 17px;
    }
    .avatar.bot  { background: linear-gradient(135deg,#1677ff,#0050d0); }
    .avatar.user { background: #dce8ff; }

    /* Bubble */
    .bubble {
      max-width: 88%; border-radius: 16px;
      font-size: 14px; line-height: 1.75; word-break: break-word;
    }
    .msg.bot  .bubble { background: #fff; box-shadow: 0 2px 10px rgba(0,0,0,.07); border-top-left-radius: 4px; overflow: hidden; }
    .msg.user .bubble { background: #1677ff; color: #fff; border-top-right-radius: 4px; padding: 11px 15px; }

    /* ── Welcome ── */
    .welcome { padding: 18px; }
    .welcome h2 { font-size: 15px; color: #1677ff; margin-bottom: 6px; }
    .welcome p  { font-size: 13px; color: #666; line-height: 1.7; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 13px; }
    .sugg-btn {
      background: #f0f5ff; color: #1677ff; border: 1px solid #adc6ff;
      border-radius: 20px; padding: 5px 14px; font-size: 12px; cursor: pointer;
      transition: all .2s;
    }
    .sugg-btn:hover { background: #1677ff; color: #fff; border-color: #1677ff; }

    /* ── Typing ── */
    .typing-wrap { padding: 14px 18px; }
    .typing { display: flex; gap: 5px; align-items: center; }
    .typing span {
      width: 8px; height: 8px; background: #c0c9dc; border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay:.2s; }
    .typing span:nth-child(3) { animation-delay:.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* ── Report card ── */
    .report { width: 100%; }

    .report-header {
      padding: 14px 18px 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    .report-title {
      font-size: 15px; font-weight: 700; color: #1a1a2e;
      display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
    }
    .report-meta {
      font-size: 12px; color: #888; line-height: 1.8;
      display: flex; flex-wrap: wrap; gap: 12px;
    }
    .report-meta span { display: flex; align-items: center; gap: 4px; }

    /* ── Sections ── */
    .rpt-section { padding: 13px 18px 2px; border-bottom: 1px solid #f5f5f5; }
    .rpt-section:last-child { border-bottom: none; padding-bottom: 16px; }

    .rpt-section-title {
      font-size: 13px; font-weight: 700; color: #1677ff;
      margin-bottom: 9px;
      display: flex; align-items: center; gap: 5px;
    }

    /* generic list in a section */
    .rpt-list { list-style: none; padding: 0; margin: 0 0 6px 0; }
    .rpt-list li {
      display: flex; align-items: baseline; gap: 7px;
      font-size: 13px; color: #333; padding: 3px 0; line-height: 1.65;
    }
    .rpt-list li .num {
      min-width: 20px; font-weight: 700; color: #555; flex-shrink: 0;
    }
    .rpt-list li .dot {
      color: #1677ff; flex-shrink: 0; font-size: 16px; line-height: 1.2;
    }

    /* steps */
    .rpt-steps { list-style: none; padding: 0; margin: 0 0 6px 0; counter-reset: step; }
    .rpt-steps li {
      display: flex; align-items: baseline; gap: 8px;
      font-size: 13px; color: #333; padding: 4px 0; line-height: 1.65;
    }
    .rpt-steps li .step-num {
      min-width: 22px; height: 20px;
      background: #1677ff; color: #fff;
      border-radius: 4px; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 1px;
    }

    /* caution */
    .rpt-caution li .dot { color: #fa8c16; }

    /* risk badge */
    .risk-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 8px;
      font-size: 13px; font-weight: 600; margin-bottom: 4px;
    }
    .risk-high { background: #fff2f0; color: #cf1322; border: 1px solid #ffccc7; }
    .risk-low  { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }

    /* ── AI 总结 ── */
    .ai-section { text-align: center; padding: 12px 18px 16px !important; }
    .ai-summary-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 20px;
      background: linear-gradient(135deg, #722ed1 0%, #531dab 100%);
      color: #fff; border: none; border-radius: 20px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all .2s; box-shadow: 0 3px 10px rgba(114,46,209,.35);
      font-family: inherit;
    }
    .ai-summary-btn:hover  { transform: scale(1.04); box-shadow: 0 4px 16px rgba(114,46,209,.45); }
    .ai-summary-btn:active { transform: scale(.97); }
    .ai-summary-btn:disabled { opacity: .7; cursor: wait; transform: none; }
    .ai-summary-btn span { font-size: 16px; }

    .ai-result { margin-top: 12px; }
    .ai-result-content {
      text-align: left; background: linear-gradient(135deg, #f9f0ff 0%, #f4f0ff 100%);
      border: 1px solid #d3adf7; border-radius: 12px; padding: 14px 16px;
      font-size: 13px; line-height: 1.85; color: #3a1a6e;
      white-space: pre-wrap; word-break: break-word;
      animation: fadeInUp .35s ease;
    }
    .ai-result-error {
      text-align: center; background: #fff2f0; border: 1px solid #ffccc7;
      border-radius: 10px; padding: 10px 14px;
      font-size: 12px; color: #cf1322;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── No result ── */
    .no-result {
      padding: 28px 20px; text-align: center; color: #aaa;
    }
    .no-result .emoji { font-size: 36px; display: block; margin-bottom: 10px; }

    /* ── Input ── */
    .input-wrap {
      flex-shrink: 0; padding: 12px 14px 14px;
      background: #fff; border-top: 1px solid #eef0f5;
      box-shadow: 0 -2px 12px rgba(0,0,0,.05);
    }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    #msgInput {
      flex: 1; border: 1.5px solid #d0d8f0; border-radius: 22px;
      padding: 10px 16px; font-size: 15px; resize: none; outline: none;
      font-family: inherit; line-height: 1.5; max-height: 120px; overflow-y: auto;
      transition: border-color .2s; background: #f8faff;
    }
    #msgInput:focus { border-color: #1677ff; background: #fff; }
    #msgInput::placeholder { color: #bbb; }
    #sendBtn {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg,#1677ff,#0050d0);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform .15s, opacity .15s;
      box-shadow: 0 3px 10px rgba(22,119,255,.4);
    }
    #sendBtn:hover  { transform: scale(1.07); }
    #sendBtn:active { transform: scale(.95); }
    #sendBtn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    #sendBtn svg { width: 20px; height: 20px; fill: #fff; }
    .hint { font-size: 11px; color: #bbb; text-align: center; margin-top: 6px; }

    /* ══════════ 手机端适配 (≤480px) ══════════ */
    @media (max-width: 480px) {
      .page { max-width: 100%; }

      /* Header 紧凑 */
      .header {
        padding: 8px 12px; gap: 6px; flex-wrap: wrap;
      }
      .header .logo { font-size: 20px; }
      .header .title { font-size: 14px; }
      .header .sub { display: none; }
      .header-status { font-size: 10px; margin-left: auto; }
      .header-add-btn {
        width: 100%; margin-left: 0; padding: 6px 0;
        justify-content: center; border-radius: 8px; font-size: 12px;
      }

      /* 聊天区域 */
      .chat-wrap { padding: 10px 6px 6px; gap: 10px; }
      .msg { gap: 6px; }
      .avatar { width: 26px; height: 26px; font-size: 13px; }
      .bubble { font-size: 13px; line-height: 1.6; }
      .msg.bot  .bubble { max-width: 92%; }
      .msg.user .bubble { max-width: 85%; padding: 8px 11px; }

      /* 欢迎卡片 */
      .welcome { padding: 12px; }
      .welcome h2 { font-size: 14px; }
      .welcome p  { font-size: 12px; }
      .suggestions { gap: 5px; }
      .sugg-btn { padding: 4px 10px; font-size: 11px; border-radius: 16px; }

      /* 报告卡片 */
      .report-header { padding: 10px 12px 8px; }
      .report-title { font-size: 13px; }
      .report-meta { font-size: 11px; gap: 6px; }
      .rpt-section { padding: 8px 12px 2px; }
      .rpt-section:last-child { padding-bottom: 12px; }
      .rpt-section-title { font-size: 12px; }
      .rpt-list li, .rpt-steps li { font-size: 12px; padding: 2px 0; }
      .rpt-steps li .step-num { min-width: 18px; height: 17px; font-size: 10px; }

      /* 输入区 */
      .input-wrap { padding: 8px 8px 10px; }
      #msgInput { padding: 8px 12px; font-size: 14px; border-radius: 18px; }
      #sendBtn { width: 36px; height: 36px; }
      #sendBtn svg { width: 16px; height: 16px; }
      .hint { font-size: 10px; margin-top: 4px; }

      /* 打字动画 */
      .typing-wrap { padding: 10px 14px; }
      .typing span { width: 6px; height: 6px; }

      /* 无结果 */
      .no-result { padding: 18px 10px; font-size: 13px; }
      .no-result .emoji { font-size: 28px; }

      /* 风险标签 */
      .risk-badge { font-size: 11px; padding: 4px 10px; }

      /* AI 总结 */
      .ai-section { padding: 10px 10px 14px !important; }
      .ai-summary-btn { font-size: 12px; padding: 7px 16px; }
      .ai-result-content { font-size: 12px; padding: 12px 14px; }
    }

    /* 中等屏 (481-640px) —— 大屏手机/小平板 */
    @media (min-width: 481px) and (max-width: 640px) {
      .page { max-width: 100%; }
      .header { padding: 10px 14px; }
      .header .sub { font-size: 10px; }
      .chat-wrap { padding: 14px 10px 8px; }
      .bubble { font-size: 13px; }
      .rpt-section { padding: 10px 14px 2px; }
    }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="logo">🔧</div>
    <div>
      <div class="title">设备维修助手</div>
      <div class="sub">基于历史维修数据库 · 智能分析</div>
    </div>
    <div class="header-status"><div class="dot"></div>在线</div>
    <a href="/add" class="header-add-btn">📝 录入维修</a>
  </div>

  <div class="chat-wrap" id="chatWrap">
    <div class="msg bot" id="welcomeMsg">
      <div class="avatar bot">🤖</div>
      <div class="bubble">
        <div class="welcome">
          <h2>你好！我是设备维修助手 👋</h2>
          <p>描述故障情况，我会从历史维修数据库中为你生成<strong>故障诊断报告</strong>，按原因分类汇总，列出措施和维修时长参考。</p>
          <div class="suggestions" id="suggList">
            <button class="sugg-btn" onclick="fillAndSend(this)">气缸不动作怎么处理</button>
            <button class="sugg-btn" onclick="fillAndSend(this)">SPO2后段自动机报警</button>
            <button class="sugg-btn" onclick="fillAndSend(this)">传感器故障维修方案</button>
            <button class="sugg-btn" onclick="fillAndSend(this)">电机过热</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="input-wrap">
    <div class="input-row">
      <textarea id="msgInput" rows="1" placeholder="描述故障情况，例如：气缸串气怎么处理…"></textarea>
      <button id="sendBtn" onclick="sendMsg()" title="发送 (Enter)">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="hint">Enter 发送 · Shift+Enter 换行</div>
  </div>

</div>

<script>
const chatWrap = document.getElementById("chatWrap");
const msgInput  = document.getElementById("msgInput");
const sendBtn   = document.getElementById("sendBtn");
let lastReportData = null;  // 保存最近一次查询结果，供 AI 总结使用

msgInput.addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 120) + "px";
});
msgInput.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

function fillAndSend(btn) {
  msgInput.value = btn.textContent.trim();
  sendMsg();
}
function scrollBottom() { chatWrap.scrollTop = chatWrap.scrollHeight; }
function esc(str) {
  if (str === null || str === undefined) return "";
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function appendMsg(html, role) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerHTML = html;
  chatWrap.appendChild(div);
  scrollBottom();
  return div;
}

function userBubble(text) {
  return `<div class="avatar user">👤</div><div class="bubble">${esc(text)}</div>`;
}
function typingBubble() {
  return `<div class="avatar bot">🤖</div>
          <div class="bubble"><div class="typing-wrap"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
}

// ── 构建报告 HTML（老工程师风格：历史情况/可能原因/处理措施/注意事项/风险提示）──
function buildReport(data) {
  const rpt = data.report;

  if (!rpt || rpt.total === 0) {
    return `<div class="avatar bot">🤖</div>
            <div class="bubble">
              <div class="no-result">
                <span class="emoji">🔍</span>
                未找到相关维修记录，请尝试换个关键词，或直接描述故障现象。
              </div>
            </div>`;
  }

  // ── Header ──
  const equip = rpt.main_equipment ? `<span>🏭 ${esc(rpt.main_equipment)}</span>` : "";
  const dateStr = rpt.latest_date ? `<span>📅 最近维修：${esc(rpt.latest_date)}</span>` : "";
  const durStr  = rpt.avg_duration ? `<span>⏱️ 平均耗时 ${rpt.avg_duration} 分钟</span>` : "";

  // ── 【历史情况】 ──
  const histSection = `
    <div class="rpt-section">
      <div class="rpt-section-title">📋 【历史情况】</div>
      <ul class="rpt-list">
        <li><span class="dot">•</span><span>过去记录到 <strong>${rpt.total}</strong> 次类似问题</span></li>
        ${rpt.latest_date ? `<li><span class="dot">•</span><span>最近一次维修：<strong>${esc(rpt.latest_date)}</strong></span></li>` : ""}
        ${rpt.avg_duration ? `<li><span class="dot">•</span><span>平均维修时长 ${rpt.avg_duration} 分钟</span></li>` : ""}
      </ul>
    </div>`;

  // ── 【可能原因】 ──
  const causes = rpt.causes || [];
  let causesItems = causes.map((c, i) =>
    `<li><span class="num">${i+1}.</span><span>${esc(c)}</span></li>`
  ).join("");
  const causesSection = `
    <div class="rpt-section">
      <div class="rpt-section-title">🔍 【可能原因】</div>
      <ul class="rpt-list">${causesItems}</ul>
    </div>`;

  // ── 【参考处理措施】 ──
  const steps = rpt.steps || [];
  let stepsItems = steps.map((s, i) =>
    `<li><span class="step-num">${i+1}</span><span>${esc(s)}</span></li>`
  ).join("");
  const stepsSection = `
    <div class="rpt-section">
      <div class="rpt-section-title">🔧 【参考处理措施】</div>
      <ul class="rpt-steps">${stepsItems || "<li><span class='step-num'>1</span><span>请参照设备维修手册排查</span></li>"}</ul>
    </div>`;

  // ── 【注意事项】 ──
  const cautions = rpt.cautions || [];
  let cautionsSection = "";
  if (cautions.length > 0) {
    let cautionItems = cautions.map(c =>
      `<li><span class="dot">⚠</span><span>${esc(c)}</span></li>`
    ).join("");
    cautionsSection = `
      <div class="rpt-section">
        <div class="rpt-section-title">⚠️ 【注意事项】</div>
        <ul class="rpt-list rpt-caution">${cautionItems}</ul>
      </div>`;
  }

  // ── 【风险提示】 ──
  let riskContent = "";
  if (rpt.is_frequent) {
    const repStr = rpt.repeat_equips && rpt.repeat_equips.length > 0
      ? `（${rpt.repeat_equips.map(e => esc(e)).join("、")} 出现频繁）`
      : "";
    riskContent = `<div class="risk-badge risk-high">🔴 该问题曾重复发生，建议排查根本原因${repStr}</div>`;
  } else {
    riskContent = `<div class="risk-badge risk-low">🟢 未发现频发记录，属偶发性故障</div>`;
  }
  const riskSection = `
    <div class="rpt-section">
      <div class="rpt-section-title">🚨 【风险提示】</div>
      ${riskContent}
    </div>`;

  // ── AI 总结按钮 ──
  const aiSection = `
    <div class="rpt-section ai-section">
      <button class="ai-summary-btn" onclick="event.stopPropagation(); requestAiSummary(this)">
        <span>🤖</span> AI 总结分析
      </button>
      <div class="ai-result" style="display:none;"></div>
    </div>`;

  return `<div class="avatar bot">🤖</div>
          <div class="bubble">
            <div class="report">
              <div class="report-header">
                <div class="report-title">📄 故障诊断报告${rpt.main_equipment ? "　·　" + esc(rpt.main_equipment) : ""}</div>
                <div class="report-meta">${equip}${dateStr}${durStr}<span>📂 匹配记录 ${rpt.total} 条</span></div>
              </div>
              ${histSection}
              ${causesSection}
              ${stepsSection}
              ${cautionsSection}
              ${riskSection}
              ${aiSection}
            </div>
          </div>`;
}

async function sendMsg() {
  const text = msgInput.value.trim();
  if (!text) return;
  sendBtn.disabled = true;
  msgInput.value = "";
  msgInput.style.height = "auto";

  appendMsg(userBubble(text), "user");
  const typingEl = appendMsg(typingBubble(), "bot");

  let res, rawText, data;
  try {
    res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });
  } catch (e) {
    typingEl.remove();
    appendMsg(`<div class="avatar bot">🤖</div>
               <div class="bubble" style="padding:12px 16px">⚠️ 无法连接服务器：${esc(e.message)}</div>`, "bot");
    sendBtn.disabled = false; msgInput.focus(); return;
  }

  try {
    rawText = await res.text();
    data = JSON.parse(rawText);
  } catch (e) {
    typingEl.remove();
    appendMsg(`<div class="avatar bot">🤖</div>
               <div class="bubble" style="padding:12px 16px">⚠️ 响应解析失败：${esc(e.message)}</div>`, "bot");
    sendBtn.disabled = false; msgInput.focus(); return;
  }

  typingEl.remove();

  try {
    if (data.success) {
      lastReportData = data;  // 保存供 AI 总结使用
      appendMsg(buildReport(data), "bot");
    } else {
      appendMsg(`<div class="avatar bot">🤖</div>
                 <div class="bubble" style="padding:12px 16px">⚠️ ${esc(data.error || "查询失败，请重试")}</div>`, "bot");
    }
  } catch (e) {
    appendMsg(`<div class="avatar bot">🤖</div>
               <div class="bubble" style="padding:12px 16px">⚠️ 渲染出错：${esc(e.message)}</div>`, "bot");
    console.error(e, data);
  }

  sendBtn.disabled = false;
  msgInput.focus();
}

// ── AI 总结 ──
async function requestAiSummary(btn) {
  if (!lastReportData || !lastReportData.report || lastReportData.report.total === 0) return;

  const resultDiv = btn.nextElementSibling;
  if (!resultDiv) return;

  // 切换到加载状态
  btn.disabled = true;
  btn.innerHTML = '<span>⏳</span> AI 正在分析...';
  resultDiv.style.display = 'none';

  try {
    const res = await fetch("/api/ai-summary", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        query: lastReportData.query,
        report: lastReportData.report
      })
    });

    const data = await res.json();

    if (data.success) {
      resultDiv.innerHTML = `<div class="ai-result-content">${esc(data.summary).replace(/\n/g, '<br>')}</div>`;
      resultDiv.style.display = 'block';
      btn.style.display = 'none';  // 成功后隐藏按钮，显示结果
    } else {
      resultDiv.innerHTML = `<div class="ai-result-error">⚠️ ${esc(data.error || 'AI 总结失败，请重试')}</div>`;
      resultDiv.style.display = 'block';
      btn.innerHTML = '<span>🤖</span> 重试 AI 总结';
      btn.disabled = false;
    }
  } catch (e) {
    resultDiv.innerHTML = `<div class="ai-result-error">⚠️ 网络错误：${esc(e.message)}</div>`;
    resultDiv.style.display = 'block';
    btn.innerHTML = '<span>🤖</span> 重试 AI 总结';
    btn.disabled = false;
  }

  scrollBottom();
}
</script>
